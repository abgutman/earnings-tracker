name: EDGAR Poll — Recent Earnings

# Schedule (all times UTC, weekdays only):
#   Pre-market burst (7:30-9:30 AM ET = 11:30-13:30 UTC, EDT):
#     11:30, 11:45                                  (7:30, 7:45 AM ET)
#     12:00, 12:15, 12:30, 12:45                    (8:00-8:45 AM ET)
#     13:00, 13:15, 13:30                           (9:00, 9:15, 9:30 AM ET)
#   Sporadic midday:
#     16:00                                         (noon ET)
#     18:00                                         (2 PM ET)
#   Post-market burst (4-5 PM ET = 20-21 UTC, EDT):
#     20:00, 20:15, 20:30, 20:45                    (4:00-4:45 PM ET)
#     21:00                                         (5:00 PM ET)
#
# Total: 15 runs per weekday during active periods.
# In winter (EST = UTC-5), all times shift back 1 hour relative to ET.
# We err on the side of running slightly earlier in winter rather than missing.
#
# Each run fetches EDGAR submissions for all tracked companies, detects new
# 8-K item 2.02 filings, updates cache.json with detected_at timestamps so
# the dashboard highlights new rows for 24 hours. Then rebuilds the HTML
# pages and commits.

on:
  workflow_dispatch:  # also runs on manual trigger
  schedule:
    - cron: '30,45 11 * * 1-5'       # 7:30, 7:45 AM ET pre-market
    - cron: '*/15 12 * * 1-5'        # 8:00, 8:15, 8:30, 8:45 AM ET pre-market
    - cron: '0,15,30 13 * * 1-5'     # 9:00, 9:15, 9:30 AM ET pre-market
    - cron: '0 16 * * 1-5'           # noon ET sporadic
    - cron: '0 18 * * 1-5'           # 2 PM ET sporadic
    - cron: '*/15 20 * * 1-5'        # 4:00, 4:15, 4:30, 4:45 PM ET post-market
    - cron: '0 21 * * 1-5'           # 5:00 PM ET post-market

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run EDGAR poll
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python simple_earnings.py edgar-poll --live
          python simple_dashboard.py

      - name: Commit + push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add earnings_data/cache.json recent_earnings.html upcoming_earnings.html earnings_data/simple_earnings_log.txt 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto: EDGAR poll $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
